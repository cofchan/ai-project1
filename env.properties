# Email Configuration
# Google email address
MAIL_USERNAME=
# Google Api password
MAIL_PASSWORD=

# JWT Secret (must be at least 256 bits)
JWT_SECRET="your-secret-key-change-this-in-production-must-be-at-least-256-bits"

# OAuth2 - Google
GOOGLE_CLIENT_ID="your_google_client_id.apps.googleusercontent.com"
GOOGLE_CLIENT_SECRET="your_google_client_secret"

# OAuth2 - GitHub
GITHUB_CLIENT_ID=your_github_client_id
GITHUB_CLIENT_SECRET=your_github_client_secret

# CAPTCHA secret key (used for HMAC signing math challenges)
CAPTCHA_SECRET=change-this-captcha-secret-in-production

# Database (if not using Docker)
DB_HOST=localhost
DB_PORT=5432
DB_NAME=registration_db
DB_USERNAME=postgres
DB_PASSWORD=postgres
